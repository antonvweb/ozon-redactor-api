# =====================================================
# NGINX Configuration for print-365.ru
# =====================================================

# Rate limiting
limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;

# Upstreams
upstream auth_service {
    server 127.0.0.1:9147;
}

upstream user_service {
    server 127.0.0.1:7293;
}

upstream ozon_api {
    server 127.0.0.1:6482;
}

upstream frontend {
    server 127.0.0.1:4000;
}

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name api.print-365.ru www.print-365.ru print-365.ru;
    return 301 https://$host$request_uri;
}

# =====================================================
# API (api.print-365.ru)
# =====================================================
server {
    listen 443 ssl http2;
    server_name api.print-365.ru;

    # SSL
    ssl_certificate /etc/letsencrypt/live/api.print-365.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.print-365.ru/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    # Security Headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;

    # CORS handled by backend services (Spring Boot)

    client_max_body_size 10M;

    # AUTH SERVICE: /api/auth/*
    location /api/auth/ {
        limit_req zone=api burst=5 nodelay;
        proxy_pass http://auth_service;
        include /etc/nginx/proxy_params;
    }

    # USER SERVICE: /api/(user|company|notifications|label-sizes)/*
    location ~ ^/api/(user|company|notifications|label-sizes)(/|$) {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://user_service;
        include /etc/nginx/proxy_params;
    }

    # OZON API: /api/(ozon|folders|labels|images|templates|datamatrix)/*
    location ~ ^/api/(ozon|folders|labels|images|templates|datamatrix)(/|$) {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://ozon_api;
        include /etc/nginx/proxy_params;
    }

    # Static uploads
    location /uploads/ {
        alias /var/www/labelEditor/uploads/;
        expires 30d;
    }
}

# =====================================================
# Frontend (print-365.ru / www.print-365.ru)
# =====================================================
server {
    listen 443 ssl http2;
    server_name print-365.ru www.print-365.ru;

    # SSL
    ssl_certificate /etc/letsencrypt/live/api.print-365.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.print-365.ru/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Proxy to frontend (localhost:4000)
    location / {
        proxy_pass http://frontend;
        include /etc/nginx/proxy_params;
    }
}
